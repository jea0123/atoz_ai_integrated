<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>산출물 메타데이터 설정</title>
  <link rel="stylesheet" href="/static/check.css?v=20260527-metadata-progress">
  <link rel="stylesheet" href="/static/metadata.css?v=20260521-layout">
</head>
<body>
  <main class="app-shell">
    <section class="workspace" aria-label="산출물 메타데이터 설정">
      <header
        class="topbar"
        data-app-header
        data-active="metadata"
        data-eyebrow="WBS Metadata"
        data-title="산출물 메타데이터 설정"
        data-status-id="statusBadge"
      ></header>

      <section class="layout metadata-layout">
        <form id="metadataForm" class="control-panel">
          <div class="panel-head">
            <h2>입력</h2>
          </div>

          <section class="metadata-folder-source" aria-labelledby="metadataFolderSourceTitle">
            <div class="metadata-folder-source-head">
              <strong id="metadataFolderSourceTitle">기준 폴더</strong>
              <span>산출물 매핑 결과 폴더를 기본으로 사용합니다.</span>
            </div>

            <label class="field metadata-auto-source" for="dumpRootInput">
              <span>산출물 매핑 결과 폴더</span>
              <input id="dumpRootInput" name="dump_root" type="text" placeholder="folder-dumps 결과 폴더 경로">
            </label>

            <div class="metadata-alternate-source" aria-labelledby="metadataAlternateSourceTitle">
              <div class="metadata-folder-section-title" id="metadataAlternateSourceTitle">다른 폴더를 사용할 경우</div>
              <label class="drop-zone folder metadata-source-folder" for="documentFiles">
                <input id="documentFiles" name="document_files" type="file" webkitdirectory directory multiple>
                <span class="file-mark">DIR</span>
                <strong>산출물 폴더</strong>
                <small id="folderName">직접 업로드할 때 선택</small>
              </label>
            </div>
          </section>

          <label class="drop-zone" for="wbsFile">
            <input id="wbsFile" name="wbs_file" type="file" accept=".xlsx,.xlsm">
            <span class="file-mark">WBS</span>
            <strong>WBS 파일</strong>
            <small id="wbsName">.xlsx, .xlsm</small>
          </label>

          <label class="drop-zone" for="standardFile">
            <input id="standardFile" name="standard_file" type="file" accept=".pdf,.hwp,.hwpx">
            <span class="file-mark">STD</span>
            <strong>문서관리표준</strong>
            <small id="standardName">.pdf, .hwp, .hwpx</small>
          </label>

          <div class="metadata-rule">
            <strong>반영 기준</strong>
            <span>· 작성자: WBS 담당</span>
            <span>· 개정일자: WBS 시작일</span>
            <span>· 승인자: 문서관리표준 작성자</span>
            <span>** V0.1 기준으로 업데이트</span>
          </div>

          <button class="primary-button" id="previewButton" type="submit">
            <span>↻</span>
            확인하기
          </button>

          <button class="secondary-button" id="applyButton" type="button">
            <span>↯</span>
            덤프 후 반영
          </button>
        </form>

        <section class="result-panel">
          <div class="summary-grid">
            <div><span>WBS 행</span><strong id="wbsCount">-</strong></div>
            <div><span>문서</span><strong id="docCount">-</strong></div>
            <div><span>반영 가능</span><strong id="matchedCount">-</strong></div>
            <div><span>확인 필요</span><strong id="reviewCount">-</strong></div>
          </div>

          <div class="result-toolbar">
            <div>
              <h2>결과</h2>
              <p id="resultMeta">WBS와 산출물 폴더를 확인할 준비가 됐습니다.</p>
            </div>
            <input id="resultFilter" type="search" placeholder="검색">
          </div>

          <section class="apply-report metadata-apply-report" id="applyReport" hidden></section>

          <div class="results">
            <div class="table-statusbar">
              <div>
                <strong id="visibleCount">0</strong>
                <span>표시 중</span>
              </div>
            </div>

            <div class="audit-table-shell">
              <table class="audit-table metadata-table">
                <thead>
                  <tr>
                    <th>반영</th>
                    <th>문서</th>
                    <th>현재 값</th>
                    <th>WBS 반영값</th>
                    <th>상태</th>
                  </tr>
                </thead>
                <tbody id="resultRows"></tbody>
              </table>
            </div>

            <p class="empty" id="emptyState">결과가 없습니다.</p>
          </div>

          <div class="loading-overlay" id="loadingOverlay" hidden>
            <div class="loading-card">
              <span class="loader"></span>
              <strong id="loadingTitle">문서 메타데이터를 확인하는 중</strong>
              <p id="loadingMessage">WBS 기준으로 산출물 문서를 대조하고 있습니다.</p>
              <ol class="loading-steps" id="loadingSteps" hidden></ol>
              <button class="loading-cancel-button" id="loadingCancelButton" type="button">취소</button>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="/static/header.js?v=20260519-metadata"></script>
  <script src="/static/metadata.js?v=20260527-metadata-progress"></script>
</body>
</html>
