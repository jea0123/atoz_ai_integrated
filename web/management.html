<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리산출물 매핑 확인</title>
  <link rel="stylesheet" href="/static/check.css?v=20260618-management">
</head>
<body>
  <main class="app-shell">
    <section class="workspace" aria-label="관리산출물 매핑 확인">
      <header
        class="topbar"
        data-app-header
        data-active="management"
        data-eyebrow="Management Outputs"
        data-title="관리산출물 매핑 확인"
        data-status-id="statusBadge"
      ></header>

      <section class="layout">
        <form id="checkForm" class="control-panel" data-empty-folder-label="관리산출물 폴더 선택">
          <input type="hidden" name="artifact_category" value="management">
          <input type="hidden" name="require_folder" value="true">
          <input type="hidden" name="requirement_generation_targets" value="__applied__">
          <input type="hidden" name="requirement_generation_create_source_folders" value="false">

          <div class="panel-head">
            <h2>입력</h2>
            <span>관리</span>
          </div>

          <fieldset class="mode-toggle">
            <legend>
              <span>매칭</span>
              <small id="runtimeMode">실행 모드 확인 중</small>
            </legend>
            <div class="mode-summary">
              <strong>산출물명 기준</strong>
              <small>파일명, 산출물명, 폴더 기준</small>
            </div>
            <label class="mode-check">
              <input id="aiFallbackToggle" type="checkbox" checked>
              <span>미매칭만 AI 확인</span>
            </label>
          </fieldset>

          <label class="drop-zone" for="standardFile" data-drop="standardFile">
            <input id="standardFile" name="standard_file" type="file" accept=".pdf">
            <span class="file-mark">PDF</span>
            <strong>문서관리표준</strong>
            <small id="standardName">관리문서 ID 범위를 읽습니다</small>
          </label>

          <label class="drop-zone folder" for="folderFiles">
            <input id="folderFiles" name="folder_files" type="file" webkitdirectory directory multiple>
            <span class="file-mark">DIR</span>
            <strong>관리산출물 폴더</strong>
            <small id="folderName">폴더 선택</small>
          </label>

          <label class="drop-zone requirement-source" for="proposalFiles">
            <input id="proposalFiles" name="proposal_files" type="file" accept=".pdf,.hwp,.hwpx,.docx,.docm,.xlsx,.xlsm,.xltx,.xltm" multiple>
            <span class="file-mark">RFP</span>
            <strong>제안요청서</strong>
            <small id="proposalName">요구사항목록표 SFR ID 추출</small>
          </label>

          <fieldset class="revision-fields">
            <legend>개정이력</legend>
            <label class="field revision-year-field" for="initialRevisionYear">
              <span>개정연도</span>
              <input id="initialRevisionYear" name="initial_revision_year" type="text" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" value="2026">
            </label>
            <label class="field" for="initialRevisionAuthor">
              <span>작성자</span>
              <input id="initialRevisionAuthor" name="initial_revision_author" type="text" value="송아름">
            </label>
            <label class="field" for="initialRevisionApprovalAuthor">
              <span>승인자</span>
              <input id="initialRevisionApprovalAuthor" name="initial_revision_approval_author" type="text" value="임채현">
            </label>
          </fieldset>

          <button class="primary-button" id="runButton" type="submit">
            <span>↻</span>
            확인하기
          </button>

          <button class="secondary-button" id="applyButton" type="button">
            <span>↯</span>
            덤프 후 반영
          </button>
        </form>

        <section class="result-panel">
          <div class="summary-grid" id="summaryGrid">
            <div><span>관리산출물</span><strong id="outputCount">-</strong></div>
            <div><span>검사 파일</span><strong id="fileCount">-</strong></div>
            <div><span>매칭 산출물</span><strong id="matchCount">-</strong></div>
            <div><span>매칭 파일</span><strong id="matchedFileCount">-</strong></div>
          </div>

          <div class="result-toolbar">
            <div>
              <h2>매칭 결과</h2>
              <p id="resultMeta">문서관리표준의 관리문서 ID와 관리산출물 폴더를 선택하세요.</p>
            </div>
            <input id="resultFilter" type="search" placeholder="검색">
          </div>

          <section class="apply-report" id="applyReport" hidden></section>

          <div class="results" id="results">
            <div class="table-statusbar">
              <div>
                <strong id="visibleCount">0</strong>
                <span>표시 중</span>
              </div>
            </div>

            <div class="audit-table-shell">
              <table class="audit-table">
                <thead>
                  <tr>
                    <th>관리산출물</th>
                    <th>반영 대상 파일</th>
                    <th>점수</th>
                  </tr>
                </thead>
                <tbody id="resultRows"></tbody>
              </table>
            </div>

            <p class="empty" id="emptyState" hidden>표시할 결과가 없습니다.</p>
          </div>

          <div class="loading-overlay" id="loadingOverlay" hidden>
            <div class="loading-card">
              <span class="loader"></span>
              <strong>관리산출물 매핑 검사 중</strong>
              <p>
                문서관리표준의 관리문서 ID와 폴더 안 문서를 읽어<br>
                파일명, 산출물명, 폴더를 비교하고 있습니다.
              </p>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="/static/header.js?v=20260618-management"></script>
  <script src="/static/check.js?v=20260618-management"></script>
</body>
</html>
