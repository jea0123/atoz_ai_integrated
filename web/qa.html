<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QA 산출물 생성 및 배치</title>
  <link rel="stylesheet" href="/static/qa.css?v=20260702-qa-match-preview">
</head>
<body class="qa-page">
  <main class="app-shell">
    <section class="workspace" aria-label="QA 산출물 생성 및 배치">
      <header
        class="topbar"
        data-app-header
        data-active="qa"
        data-eyebrow="QA Outputs"
        data-title="QA 산출물 생성 및 배치"
        data-status-id="statusBadge"
      ></header>

      <section class="layout qa-layout">
        <aside class="qa-sidebar qa-controls">
          <section class="control-panel qa-input-card">
            <div class="panel-head">
              <h2>입력</h2>
            </div>

            <form id="folderQaForm" class="folder-qa-form">
              <section class="folder-source-group" aria-labelledby="folderSourceTitle">
                <div class="folder-source-head">
                  <strong id="folderSourceTitle">
                    QA 대상 폴더
                    <span class="method-help" tabindex="0" aria-label="사용자인터페이스설계서, 단위시험케이스, 단위시험결과서, 통합시험시나리오, 통합시험결과서를 자동으로 찾습니다.">?</span>
                  </strong>
                </div>
                <p class="folder-input-note">
                  선택한 폴더에서 QA 생성에 필요한 문서를 자동으로 찾습니다.
                </p>
                <div class="folder-method-heading">
                  <strong>
                    대상 폴더 선택 방식
                    <span class="method-help" tabindex="0" aria-label="QA를 적용할 폴더를 선택합니다. 다른 폴더 경로나 업로드를 사용하면 자동 지정 폴더보다 우선 적용됩니다.">?</span>
                  </strong>
                </div>
                <div class="folder-source-options" aria-labelledby="alternateSourceTitle">
                  <label class="folder-source-option" for="qaDumpRoot">
                    <span class="field-title">
                      <span class="method-index">1</span>
                      <span class="method-label">자동 지정된 결과 폴더</span>
                      <span class="method-help" tabindex="0" aria-label="관리/개발 산출물 또는 템플릿에서 생성한 결과 폴더를 사용합니다.">?</span>
                    </span>
                    <input id="qaDumpRoot" name="dump_root" type="text" autocomplete="off" placeholder="자동 지정된 결과 폴더">
                  </label>
                  <label class="folder-source-option" for="qaSourceRoot">
                    <span class="field-title">
                      <span class="method-index">2</span>
                      <span class="method-label" id="alternateSourceTitle">다른 폴더 경로</span>
                      <span class="method-help" tabindex="0" aria-label="입력한 폴더에서 파일을 교체 배치합니다. 자동 지정 폴더보다 우선 적용됩니다.">?</span>
                    </span>
                    <input id="qaSourceRoot" name="qa_source_root" type="text" autocomplete="off" placeholder="QA를 적용할 산출물 폴더 경로">
                  </label>
                  <div class="folder-source-option">
                    <span class="field-title">
                      <span class="method-index">3</span>
                      <span class="method-label">산출물 폴더 업로드</span>
                      <span class="method-help" tabindex="0" aria-label="업로드한 폴더의 복사본에서 QA를 생성하고 파일을 교체 배치합니다. 원본은 수정하지 않습니다.">?</span>
                    </span>
                    <label class="drop-zone optional-source" for="qaSourceFiles">
                      <input id="qaSourceFiles" name="qa_source_files" type="file" accept=".hwpx,.pdf,.xlsx" webkitdirectory directory multiple>
                      <span class="file-mark">DIR</span>
                      <strong>
                        폴더 선택
                      </strong>
                      <small data-file-label="qaSourceFiles">선택된 폴더가 없습니다.</small>
                    </label>
                  </div>
                </div>
                <div class="advanced-folder-section">
                  <details class="advanced-folder-inputs">
                    <summary>문서별 위치 따로 지정</summary>
                    <div class="advanced-folder-inputs-body">
                      <p>기본 대상 폴더에서 찾지 못하는 입력 문서만 지정하세요. 생성 결과는 위에서 선택한 QA 대상 폴더에 배치됩니다.</p>
                      <label class="field" for="uiDesignRoot">
                        <span>사용자인터페이스설계서</span>
                        <input id="uiDesignRoot" name="ui_design_root" type="text" autocomplete="off" placeholder="사용자인터페이스설계서 폴더 경로">
                      </label>
                      <label class="field" for="tcSourceRoot">
                        <span>단위시험케이스</span>
                        <input id="tcSourceRoot" name="tc_source_root" type="text" autocomplete="off" placeholder="단위시험케이스 폴더 경로">
                      </label>
                      <label class="field" for="unitResultRoot">
                        <span>단위시험결과서</span>
                        <input id="unitResultRoot" name="unit_result_root" type="text" autocomplete="off" placeholder="단위시험결과서 폴더 경로">
                      </label>
                      <label class="field" for="tsSourceRoot">
                        <span>통합시험시나리오</span>
                        <input id="tsSourceRoot" name="ts_source_root" type="text" autocomplete="off" placeholder="통합시험시나리오 폴더 경로">
                      </label>
                      <label class="field" for="integrationResultRoot">
                        <span>통합시험결과서</span>
                        <input id="integrationResultRoot" name="integration_result_root" type="text" autocomplete="off" placeholder="통합시험결과서 폴더 경로">
                      </label>
                    </div>
                  </details>
                </div>
              </section>
              <button class="primary-button folder-preview-button" id="folderPreviewButton" type="button">
                <span>✓</span>
                매칭 확인
              </button>
              <button class="secondary-button folder-submit-button" id="folderQaButton" type="submit">
                <span>↯</span>
                생성 및 배치
              </button>
            </form>
          </section>

          <details class="individual-tools">
            <summary>개별 생성 도구 열기</summary>
            <div class="individual-tools-body">
              <nav class="task-tabs" aria-label="개별 생성 작업 선택">
                <button type="button" class="task-tab active" data-task-tab="tc">
                  <strong>단위시험케이스</strong>
                </button>
                <button type="button" class="task-tab" data-task-tab="ts">
                  <strong>통합시험시나리오</strong>
                </button>
              </nav>

              <form id="tcForm" class="task-form active" data-task-panel="tc">
                <label class="drop-zone" for="tcTemplateHwpx">
                  <input id="tcTemplateHwpx" name="template_hwpx" type="file" accept=".hwpx">
                  <span class="file-mark">HWPX</span>
                  <strong>기존 단위시험 케이스</strong>
                  <small data-file-label="tcTemplateHwpx">파일 선택</small>
                </label>

                <label class="drop-zone" for="tcUiPdf">
                  <input id="tcUiPdf" name="ui_pdf" type="file" accept=".pdf" multiple>
                  <span class="file-mark">DOC</span>
                  <strong>사용자인터페이스설계서</strong>
                  <small data-file-label="tcUiPdf">파일 선택</small>
                </label>
                <button class="primary-button" id="tcButton" type="submit">생성</button>
              </form>

              <form id="tsForm" class="task-form" data-task-panel="ts">
                <label class="drop-zone" for="tsTemplateXlsx">
                  <input id="tsTemplateXlsx" name="template_xlsx" type="file" accept=".xlsx">
                  <span class="file-mark">XLSX</span>
                  <strong>기존 통합시험 시나리오</strong>
                  <small data-file-label="tsTemplateXlsx">파일 선택</small>
                </label>

                <label class="drop-zone" for="tsTcXlsx">
                  <input id="tsTcXlsx" name="tc_xlsx" type="file" accept=".xlsx" multiple>
                  <span class="file-mark">XLSX</span>
                  <strong>단위시험 케이스</strong>
                  <small data-file-label="tsTcXlsx">단위시험 케이스 엑셀 파일 선택</small>
                </label>

                <label class="drop-zone" for="tsUiPdf">
                  <input id="tsUiPdf" name="ui_pdf" type="file" accept=".pdf" multiple>
                  <span class="file-mark">DOC</span>
                  <strong>사용자인터페이스설계서</strong>
                  <small data-file-label="tsUiPdf">파일 선택</small>
                </label>
                <button class="primary-button" id="tsButton" type="submit">생성</button>
              </form>
            </div>
          </details>
        </aside>

        <section class="result-panel qa-results">
          <div class="result-toolbar qa-toolbar">
            <div>
              <h2 id="resultTitle">결과</h2>
              <p id="resultMeta">생성 작업을 선택하고 파일을 업로드하세요.</p>
            </div>
          </div>

          <section class="error-panel" id="errorPanel" hidden></section>
          <section class="download-panel" id="downloadPanel" hidden></section>
          <p class="empty qa-empty" id="emptyState">생성된 파일이 아직 없습니다.</p>

        </section>
      </section>
    </section>
  </main>

  <script src="/static/header.js?v=20260702-qa-generation-tab"></script>
  <script src="/static/qa.js?v=20260702-qa-match-preview"></script>
</body>
</html>
