<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>테스트 케이스/시나리오 생성</title>
  <link rel="stylesheet" href="/static/qa.css?v=20260519-ts-focused-ui">
</head>
<body class="qa-page">
  <main class="app-shell">
    <section class="workspace" aria-label="테스트 케이스/시나리오 생성">
      <header
        class="topbar"
        data-app-header
        data-active="qa"
        data-eyebrow="QA"
        data-title="테스트 케이스/시나리오 생성"
        data-status-id="statusBadge"
      ></header>

      <section class="layout qa-layout">
        <aside class="control-panel qa-controls">
          <div class="panel-head">
            <h2>작업</h2>
            <span id="runtimeMode">실행 모드 확인 중</span>
          </div>

          <form id="folderQaForm" class="folder-qa-form">
            <label class="field" for="qaDumpRoot">
              <span>check 결과 폴더</span>
              <input id="qaDumpRoot" name="dump_root" type="text" autocomplete="off" placeholder="결과 폴더 경로">
            </label>
            <label class="field" for="qaSourceRoot">
              <span>QA 원천 폴더 경로</span>
              <input id="qaSourceRoot" name="qa_source_root" type="text" autocomplete="off" placeholder="세 문서가 함께 있는 폴더 경로">
            </label>
            <label class="drop-zone compact" for="qaSourceFiles">
              <input id="qaSourceFiles" name="qa_source_files" type="file" accept=".hwp,.hwpx,.pdf,.xlsx" webkitdirectory directory multiple>
              <span class="file-mark">ALL</span>
              <strong>QA 원천 폴더 선택</strong>
              <small data-file-label="qaSourceFiles">화면/단위/통합 문서 일괄 업로드</small>
            </label>
            <section class="selected-folder-preview" id="qaSourcePreview" aria-live="polite" hidden></section>
            <label class="field" for="uiDesignRoot">
              <span>화면설계서 폴더 경로</span>
              <input id="uiDesignRoot" name="ui_design_root" type="text" autocomplete="off" placeholder="직접 경로 입력 또는 아래 폴더 선택">
            </label>
            <label class="field" for="tcSourceRoot">
              <span>단위시험 폴더 경로</span>
              <input id="tcSourceRoot" name="tc_source_root" type="text" autocomplete="off" placeholder="선택 입력">
            </label>
            <label class="field" for="tsSourceRoot">
              <span>통합시험 폴더 경로</span>
              <input id="tsSourceRoot" name="ts_source_root" type="text" autocomplete="off" placeholder="선택 입력">
            </label>
            <label class="drop-zone compact" for="uiDesignFiles">
              <input id="uiDesignFiles" name="ui_design_files" type="file" accept=".hwp,.hwpx,.pdf" webkitdirectory directory multiple>
              <span class="file-mark">DIR</span>
              <strong>화면설계서 폴더 선택</strong>
              <small data-file-label="uiDesignFiles">하위 HWP/HWPX/PDF 일괄 업로드</small>
            </label>
            <section class="selected-folder-preview" id="uiDesignPreview" aria-live="polite" hidden></section>
            <button class="secondary-button" id="folderQaButton" type="submit">결과폴더 QA 생성</button>
          </form>

          <nav class="task-tabs" aria-label="작업 선택">
            <button type="button" class="task-tab active" data-task-tab="tc">
              <span>1단계</span>
              <strong>단위시험 케이스</strong>
            </button>
            <button type="button" class="task-tab" data-task-tab="ts">
              <span>2단계</span>
              <strong>통합시험 시나리오</strong>
            </button>
          </nav>

          <form id="tcForm" class="task-form active" data-task-panel="tc">
            <label class="drop-zone" for="tcTemplateHwpx">
              <input id="tcTemplateHwpx" name="template_hwpx" type="file" accept=".hwpx">
              <span class="file-mark">HWPX</span>
              <strong>기존 단위시험 케이스</strong>
              <small data-file-label="tcTemplateHwpx">HWPX 파일 선택</small>
            </label>

            <label class="drop-zone" for="tcUiPdf">
              <input id="tcUiPdf" name="ui_pdf" type="file" accept=".hwp,.hwpx,.pdf" multiple>
              <span class="file-mark">DOC</span>
              <strong>사용자인터페이스설계서</strong>
              <small data-file-label="tcUiPdf">파일 선택</small>
            </label>
            <button class="primary-button" id="tcButton" type="submit">생성</button>
          </form>

          <form id="tsForm" class="task-form" data-task-panel="ts">
            <label class="drop-zone" for="tsTemplateXlsx">
              <input id="tsTemplateXlsx" name="template_xlsx" type="file" accept=".xlsx">
              <span class="file-mark">XLSX</span>
              <strong>기존 통합시험 시나리오</strong>
              <small data-file-label="tsTemplateXlsx">파일 선택</small>
            </label>

            <label class="drop-zone" for="tsTcXlsx">
              <input id="tsTcXlsx" name="tc_xlsx" type="file" accept=".xlsx" multiple>
              <span class="file-mark">XLSX</span>
              <strong>단위시험 케이스</strong>
              <small data-file-label="tsTcXlsx">1단계에서 생성한 엑셀 파일 선택</small>
            </label>

            <label class="drop-zone" for="tsUiPdf">
              <input id="tsUiPdf" name="ui_pdf" type="file" accept=".hwp,.hwpx,.pdf" multiple>
              <span class="file-mark">DOC</span>
              <strong>사용자인터페이스설계서</strong>
              <small data-file-label="tsUiPdf">파일 선택</small>
            </label>
            <button class="primary-button" id="tsButton" type="submit">생성</button>
          </form>
        </aside>

        <section class="result-panel qa-results">
          <div class="result-toolbar qa-toolbar">
            <div>
              <h2 id="resultTitle">결과</h2>
              <p id="resultMeta">생성 작업을 선택하고 파일을 업로드하세요.</p>
            </div>
          </div>

          <section class="error-panel" id="errorPanel" hidden></section>
          <section class="download-panel" id="downloadPanel" hidden></section>
          <p class="empty qa-empty" id="emptyState">생성된 파일이 아직 없습니다.</p>

          <div class="loading-overlay" id="loadingOverlay" hidden>
            <div class="loading-card">
              <span class="loader"></span>
              <strong id="loadingTitle">처리 중</strong>
              <p id="loadingMessage">요청을 처리하고 있습니다.</p>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="/static/header.js?v=20260518-integrated"></script>
  <script src="/static/qa.js?v=20260519-ts-focused-ui"></script>
</body>
</html>
